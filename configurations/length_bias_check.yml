config:
  debug: True
  run_name: "LengthBiasCheck"
  incompatibilities:
    - - "names"
      - "name_list"
    - - "locations"
      - "locations_directions"


datasets:
    args:
      filler_tokens_low: 200
      filler_tokens_high: 200
      pre_question_filler: 1000
      dataset_examples: 5

    datasets:
      - name: "shopping"
        args:
          item_changes: 4

      - name: "locations_directions"
        args:
          known_locations: 4
